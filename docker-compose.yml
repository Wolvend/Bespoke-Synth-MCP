services:
  mcp_bespoke_server:
    build:
      context: .
      dockerfile: infra/docker/mcp_bespoke_server.Dockerfile
    env_file:
      - .env
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 8000
    ports:
      - "8000:8000"
      - "9002:9002/udp"
      - "9010:9010/udp"
    command: ["python", "-m", "mcp_bespoke_server.server"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  orchestrator:
    build:
      context: .
      dockerfile: infra/docker/orchestrator.Dockerfile
    env_file:
      - .env
    environment:
      MCP_CLIENT_TRANSPORT: http
      MCP_SERVER_URL: http://mcp_bespoke_server:8000/mcp
    depends_on:
      mcp_bespoke_server:
        condition: service_healthy
    ports:
      - "8088:8088"
    command: ["python", "-m", "orchestrator.api"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
