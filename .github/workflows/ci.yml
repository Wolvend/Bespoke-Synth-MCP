name: ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [services/mcp_bespoke_server, orchestrator]
    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -U pip && python -m pip install -e .[dev]
      - name: Ruff
        run: python -m ruff check src tests
      - name: Mypy
        run: python -m mypy src
      - name: Pytest
        run: python -m pytest

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build MCP server image
        run: docker build -f infra/docker/mcp_bespoke_server.Dockerfile .
      - name: Build orchestrator image
        run: docker build -f infra/docker/orchestrator.Dockerfile .

