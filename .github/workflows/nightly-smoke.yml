name: nightly-smoke

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [services/mcp_bespoke_server, orchestrator]
    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -U pip && python -m pip install -e .[dev]
      - name: Test
        run: python -m pytest

